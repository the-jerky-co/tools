<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --bg: #0d0d0d;
                --surface: #161616;
                --border: #2a2a2a;
                --accent: #c8f135;
                --text: #e8e8e8;
                --muted: #666;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                background: var(--bg);
            }

            .staticrypt-content {
                height: 100%;
                background: var(--bg);
                font-family: 'Syne', sans-serif;
                color: var(--text);
                display: flex;
                flex-direction: column;
            }

            /* ── Header ── */
            .tt-header {
                border-bottom: 1px solid var(--border);
                padding: 48px 64px 40px;
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 24px;
                flex-wrap: wrap;
            }

            .tt-logo {
                font-size: clamp(2.5rem, 5vw, 4rem);
                font-weight: 800;
                letter-spacing: -0.03em;
                line-height: 1;
                color: var(--text);
            }

            .tt-logo span { color: var(--accent); }

            .tt-meta {
                font-family: 'DM Mono', monospace;
                font-size: 0.75rem;
                color: var(--muted);
                text-align: right;
                line-height: 1.8;
            }

            /* ── Card ── */
            .staticrypt-page {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 48px 24px;
            }

            .staticrypt-form {
                background: var(--surface);
                border: 1px solid var(--border);
                padding: 48px;
                width: 100%;
                max-width: 400px;
            }

            .staticrypt-instructions {
                margin-bottom: 32px;
            }

            .staticrypt-title {
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--text);
                margin-bottom: 8px;
            }

            .staticrypt-instructions p:last-child {
                font-family: 'DM Mono', monospace;
                font-size: 0.8rem;
                color: var(--muted);
                line-height: 1.6;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid var(--border);
                margin: 0 0 24px;
            }

            /* ── Input ── */
            .staticrypt-password-container {
                position: relative;
                background: var(--bg);
                border: 1px solid var(--border);
                margin-bottom: 16px;
                transition: border-color 0.15s;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                width: 100%;
                padding: 14px 48px 14px 16px;
                font-family: 'DM Mono', monospace;
                font-size: 0.9rem;
                color: var(--text);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                width: 16px;
                opacity: 0.4;
                padding: 0;
                position: absolute;
                right: 16px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.15s;
            }

            .staticrypt-toggle-password-visibility:hover { opacity: 0.8; }

            /* ── Button ── */
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                background: var(--accent);
                border: 0;
                padding: 14px;
                color: #0d0d0d;
                font-family: 'Syne', sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                cursor: pointer;
                transition: filter 0.15s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                filter: brightness(90%);
            }

            /* ── Remember me ── */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 16px;
                font-family: 'DM Mono', monospace;
                font-size: 0.75rem;
                color: var(--muted);
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: var(--accent);
                width: 14px;
                height: 14px;
                flex-shrink: 0;
            }

            /* ── Footer ── */
            .tt-footer {
                padding: 24px 64px;
                font-family: 'DM Mono', monospace;
                font-size: 0.7rem;
                color: var(--muted);
                display: flex;
                gap: 8px;
                align-items: center;
                border-top: 1px solid var(--border);
            }

            .tt-footer::before {
                content: '';
                display: block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                flex-shrink: 0;
            }

            /* ── Spinner ── */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 2px solid var(--border);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            .hidden { display: none !important; }

            @media (max-width: 640px) {
                .tt-header, .tt-footer { padding-left: 24px; padding-right: 24px; }
                .tt-header { padding-top: 32px; padding-bottom: 24px; }
                .staticrypt-form { padding: 32px 24px; }
            }
        </style>
    </head>

                        <input type="submit" class="staticrypt-decrypt-button" value="DECRYPT" />
                    </form>
                </div>
            </div>
