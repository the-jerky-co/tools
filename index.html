<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --text: #e8e8e8;
      --muted: #666;
      --card-hover: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 48px 64px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .site-title span {
      color: var(--accent);
    }

    .site-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.8;
    }

    /* ── Layout ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 64px 0;
    }

    /* ── Category ── */
    .category {
      margin-bottom: 56px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .category-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Tool Grid ── */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .tool-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      gap: 12px;
    }

    .tool-card:hover {
      background: var(--card-hover);
      color: var(--accent);
    }

    .tool-name {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .tool-arrow {
      font-size: 1rem;
      opacity: 0.4;
      transition: opacity 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .tool-card:hover .tool-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .empty {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 32px 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      padding: 0 64px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    footer::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    @media (max-width: 640px) {
      header, main, footer { padding-left: 24px; padding-right: 24px; }
      header { padding-top: 32px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="site-title">Team<span>Tools</span></h1>
    <div class="site-meta">
      Internal use only<br>
      Updated 19 Apr 2026, 16:25
    </div>
  </header>

  <main>
    <p class="empty">No tools published yet. Drop an HTML file into a department folder on the NAS to get started.</p>
  </main>

  <footer>Auto-generated from repository structure</footer>

</body>
</html>
